<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="shortcut icon" href="dogLookingUp.png" sizes="192x192" type="image/png"/>
  <title>Pet Insurance : V1</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
  
  <link href="style.css" rel="stylesheet" type="text/css" />
  <style>

  </style>
</head>

<body style="/*background-image: url(dogLookingUp.png); */ background-size: cover; background-position: right; background-color: lightgray;">
  
  <div class="bg-dark p-3">
    <img src="logo.jpg" alt="AIG Logo" style="margin: auto; display: block;">
  </div>

  <section class="d-flex flex-column">
    <!-- <form></form> -->
    <h2 class="align-self-center" style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">Premium Calculator.</h2>
    <p>Calculate price for Dog insurance premium</p>
    <hr>
  </section>

  <section class="row">
    <div class="opts col-sm-3">
      <label for="agedd">Age in years</label>
      <select name="age" id="agedd">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>
  
    <div class="opts col-sm-3">
      <label for="genderdd">Gender</label>
      <select name="gender" id="genderdd">
        <option value=".06">Female</option>
        <option value=".1">Male</option>
      </select>
    </div>

    <div class="opts  col-sm-3">
      <label for="btdd">Breed</label>
      <select name="breed" id="btdd">
        <option value=".1">Pedigree</option>
        <option value=".06">Cross Breed</option>
        <option value=".01">Mixed Breed</option>
      </select>
    </div>
    <hr>
  </section>

  <section>
    <div>
      Premium Value: <strong>$<span id="prem">--.--</span></strong>
    </div>
    <div>
      <button onclick="jcp()">Calculate Premium</button>
    </div>
    <hr>
    <p>Adjust the values above to calculate a premium</p>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>

  <!-- <script src="script.js"></script> -->

</body>

</html>
